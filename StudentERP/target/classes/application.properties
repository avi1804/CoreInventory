# =============================================
#  StudentERP - Application Configuration
# =============================================

# Server
server.port=8080
spring.application.name=StudentERP

# ── Database ──────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/student_erp?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────
# Change this secret to a strong 256-bit key in production
app.jwt.secret=3f8a2b1c9d4e5f607182930a4b5c6d7e8f90a1b2c3d4e5f6071829304b5c6d7e
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 hours

# ── File Upload ───────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────────
logging.level.com.erp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
